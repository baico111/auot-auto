name: Bytenut Auto Renew

on:
  workflow_dispatch:
#  schedule:
#    - cron: '0 16 * * *'

# ⚠️ 必须添加权限配置，允许 Action 修改仓库文件
permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests
        
    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: Setup Proxy Tunnel (Gost)
      env:
        PROXY_URL: ${{ secrets.PROXY }} 
      run: |
        # 1. 只有当 PROXY_URL 不为空时才下载和启动 Gost
        if [ -n "${PROXY_URL}" ]; then
          echo "检测到代理配置，正在启动隧道..."
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          # 启动 Gost 映射到 1080
          nohup ./gost-linux-amd64-2.11.5 -L :1080 -F "${PROXY_URL}" > gost.log 2>&1 &
          sleep 5
          curl -il -x socks5://127.0.0.1:1080 https://api.ipify.org || echo "代理连接测试失败"
        else
          echo "未配置代理变量，跳过隧道设置，将直接连接网络。"
        fi

    - name: Run Script
      env:
        PROXY: socks5://127.0.0.1:1080
        TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}      # 映射 Secret
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  # 映射 Secret
        ACCOUNTS: ${{ secrets.ACCOUNTS }}  # 映射 Secret
      run: |
        # 使用 xvfb 运行以支持强力过人机验证模式
        xvfb-run -a python bytenut.py
