name: Bytenut Auto Renew

on:
  workflow_dispatch:
#  schedule:
#    - cron: '0 16 * * *'

permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests
        
    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    # ================= 🛡️ 启动 Xray 代理转发 (完全克隆自 OptikLink) =================
    - name: Setup Proxy Tunnel (Xray)
      env:
        XRAY_VMESS_VLESS: ${{ secrets.PROXY }}
      if: env.XRAY_VMESS_VLESS != ''
      run: |
        echo "📥 下载 Xray-core..."
        wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
        sudo apt-get install -y unzip
        unzip -o Xray-linux-64.zip xray
        chmod +x xray

        echo "📝 生成 Xray 配置文件..."
        # ⚠️ 注意：下面的 EOF 标志必须严格顶格左对齐，不能有任何缩进
        cat <<EOF > xray_config.json
{
  "inbounds": [{
    "port": 8080,
    "listen": "127.0.0.1",
    "protocol": "http",
    "settings": { "timeout": 360 }
  }],
  "outbounds": [{
    "protocol": "vless",
    "settings": {
      "vnext": [{
        "address": "38.97.62.210",
        "port": 50897,
        "users": [{
          "id": "213a7536-6d24-4161-81a9-929a90f946a8",
          "encryption": "none",
          "flow": "xtls-rprx-vision"
        }]
      }]
    },
    "streamSettings": {
      "network": "tcp",
      "security": "reality",
      "realitySettings": {
        "show": false,
        "fingerprint": "firefox",
        "serverName": "www.iij.ad.jp",
        "publicKey": "v9ngNcy7TywBomF4g1eGgDWiVBsXrrGEAVeQJpC9BDE",
        "shortId": "",
        "spiderX": ""
      }
    }
  }]
}
EOF

        echo "🚀 启动 Xray..."
        nohup ./xray -c xray_config.json > xray.log 2>&1 &
        
        sleep 5
        echo "✅ Xray 已启动，测试连通性..."
        curl -s -x http://127.0.0.1:8080 https://api.ipify.org || (cat xray.log && exit 1)

    # ================= 🚀 运行 Bytenut 脚本 =================
    - name: Run Script
      env:
        # 对接到 Xray 的 8080 端口
        PROXY: http://127.0.0.1:8080
        TG_TOKEN: ${{ secrets.TG_TOKEN }}      
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  
        ACCOUNTS: ${{ secrets.ACCOUNTS }}  
      run: |
        # 检查 8080 端口是否启用，没启用就清空 PROXY 变量直接运行
        if ! nc -z 127.0.0.1 8080 2>/dev/null; then
          echo "⚠️ 代理端口未就绪，尝试直接连接..."
          export PROXY=""
        fi
        xvfb-run -a python bytenut.py

    - name: 📸 上传报告与截图
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bytenut-results
        path: |
          artifacts/
