name: Bytenut Auto Renew

on:
  workflow_dispatch:
#  schedule:
#    - cron: '0 16 * * *'

permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests
        
    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    # ================= 核心：换成 Xray 代理 =================
    - name: Setup Proxy Tunnel (Xray)
      env:
        # 这里依然读取你的 Secret
        XRAY_CONF: ${{ secrets.PROXY }} 
      run: |
        # 只有在配置了 Secret 的情况下才运行，防止报错
        if [ -n "${XRAY_CONF}" ]; then
          echo "📥 下载 Xray..."
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o Xray-linux-64.zip xray
          chmod +x xray

          # 生成配置文件 (监听 1080 端口，保持与你后面脚本一致)
          cat <<EOF > xray_config.json
          {
            "inbounds": [{
              "port": 1080,
              "listen": "127.0.0.1",
              "protocol": "http",
              "settings": { "timeout": 360 }
            }],
            "outbounds": [{
              "protocol": "vless",
              "settings": {
                "vnext": [{
                  "address": "38.97.62.210",
                  "port": 50897,
                  "users": [{
                    "id": "213a7536-6d24-4161-81a9-929a90f946a8",
                    "encryption": "none",
                    "flow": "xtls-rprx-vision"
                  }]
                }]
              },
              "streamSettings": {
                "network": "tcp",
                "security": "reality",
                "realitySettings": {
                  "show": false,
                  "fingerprint": "firefox",
                  "serverName": "www.iij.ad.jp",
                  "publicKey": "v9ngNcy7TywBomF4g1eGgDWiVBsXrrGEAVeQJpC9BDE",
                  "shortId": "",
                  "spiderX": ""
                }
              }
            }]
          }
          EOF

          nohup ./xray -c xray_config.json > xray.log 2>&1 &
          sleep 5
          echo "✅ Xray (Reality) 已启动"
          curl -s -x http://127.0.0.1:1080 https://api.ipify.org || echo "⚠️ 代理连接失败"
        else
          echo "跳过代理设置"
        fi

    - name: Run Script
      env:
        # 这里的协议改成了 http，因为 Xray inbound 设的是 http，更稳定
        PROXY: http://127.0.0.1:1080
        TG_TOKEN: ${{ secrets.TG_TOKEN }}      
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  
        ACCOUNTS: ${{ secrets.ACCOUNTS }}  
      run: |
        # 检查 1080 端口是否启用，没启用就清空 PROXY 变量
        if ! nc -z 127.0.0.1 1080 2>/dev/null; then
          export PROXY=""
        fi
        xvfb-run -a python bytenut.py
