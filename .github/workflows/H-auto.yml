name: Hax Auto Renew Logic (Free Mode)

on:
  schedule:
    - cron: '20 18 */3 * *'
  workflow_dispatch:

jobs:
  hax-renewal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      # 关键步骤：拉取私有库代码
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: baico111/auto-haxrenw
          token: ${{ secrets.MY_PRIVATE_TOKEN }} # 存放你的 PAT
          path: core_code # 将私有代码下载到这个文件夹

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
          libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64 \
          libpango-1.0-0 libcairo2 libgl1 libglib2.0-0 jq

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Requirements
        run: |
          pip install --upgrade pip
          pip install seleniumbase pyrogram tgcrypto requests loguru

      - name: Run Hax Task
        id: hax_run
        continue-on-error: true
        env:
          # 以下这些变量都需要在【公开仓库】的 Secrets 里配置
          TG_STRING_SESSION: ${{ secrets.TG_STRING_SESSION }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
          TELEGRAM_PHONE: ${{ secrets.TELEGRAM_PHONE }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL_NAME: ${{ secrets.AI_MODEL_NAME }}
          # 关键点：PYTHONPATH 指向私有代码存放的目录
          PYTHONPATH: ${{ github.workspace }}/core_code
        run: python core_code/hax_renw.py

      - name: Change IP and Restart Workflow
        if: steps.hax_run.outcome == 'failure' && github.run_attempt < 6
        run: |
          echo "检测到任务失败，准备换 IP 重试（当前第 ${{ github.run_attempt }} 次）"
          
          # 注意：这里的名字必须和本文件的 name 一致
          WORKFLOW_NAME="Hax Auto Renew Logic (Free Mode)"
          
          WORKFLOW_ID=$(curl -s -H "Authorization: token ${{ secrets.MY_PRIVATE_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows" \
            | jq -r ".workflows[] | select(.name==\"$WORKFLOW_NAME\") | .id")

          echo "目标工作流 ID: $WORKFLOW_ID"

          curl -L -i -X POST \
            -H "Authorization: token ${{ secrets.MY_PRIVATE_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW_ID/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}'
          
          exit 1
