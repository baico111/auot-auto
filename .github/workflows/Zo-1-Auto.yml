name: Zo-1-Auto-Renew-Workflow

on:
  workflow_dispatch: # 支持手动点击 "Run workflow" 触发
  schedule:
    - cron: '0 22 * * *' # 自动运行：每天北京时间早上 6:00 (UTC 22:00)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v3

      - name: 2. 安装 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安装项目依赖
        run: |
          pip install telethon playwright
          # 安装 Playwright 浏览器内核及其系统依赖（这一步在 GitHub 环境必须有）
          playwright install --with-deps chromium

      - name: 4. 执行自动化脚本
        env:
          # 从 GitHub Secrets 中读取变量并注入到系统环境变量
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TG_STRING_SESSION: ${{ secrets.TG_STRING_SESSION }}
          WENPASSWORD: ${{ secrets.WENPASSWORD }}
          TELEGRAM_ACCOUNT_ID: ${{ secrets.TELEGRAM_ACCOUNT_ID }}
          # 如果你有 TELEGRAM_BOT_TOKEN 等其他变量也可以一并写入
        run: python main.py
