name: Hax-US Auto Renew Logic

on:
  schedule:
    - cron: '30 19 */3 * *'
  workflow_dispatch:

jobs:
  hax-renewal:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --- 关键：使用同一个变量拉取私库代码 ---
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: baico111/auto-haxrenw
          # 必须在公开仓库 Settings 里存入 MY_GITHUB_TOKEN
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: .  # 保持代码铺在根目录，确保 PYTHONPATH 逻辑不变

      # === 新增:缓存浏览器 profile,跨次运行保持 cookie/指纹累积 ===
      # reCAPTCHA v3 会随 profile 历史累积而给更高分
      # 失败换 IP 重试时,这个 cache 也会被复用,让新 IP 也能吃到老 cookie 红利
      - name: 💾 Cache browser profile
        uses: actions/cache@v4
        with:
          path: ./browser_profile
          key: chrome-profile-${{ github.run_id }}
          restore-keys: |
            chrome-profile-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
          libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64 \
          libpango-1.0-0 libcairo2 libgl1 libglib2.0-0 jq

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Requirements
        run: |
          pip install --upgrade pip
          pip install seleniumbase pyrogram tgcrypto requests loguru

      - name: Run Hax Task
        id: hax_run
        # 1. 在这里设置 15 分钟超时
        timeout-minutes: 15
        continue-on-error: true  # 必须开启，允许报错后执行下一步换IP逻辑
        env:
          # 注入你代码中 _US 结尾的所有变量（需在公开库 Secrets 配置）
          TG_STRING_SESSION_US: ${{ secrets.TG_STRING_SESSION_US }}
          TELEGRAM_BOT_TOKEN_US: ${{ secrets.TELEGRAM_BOT_TOKEN_US }}
          MY_CHAT_ID_US: ${{ secrets.MY_CHAT_ID_US }}
          TELEGRAM_PHONE_US: ${{ secrets.TELEGRAM_PHONE_US }}
          TELEGRAM_API_ID_US: ${{ secrets.TELEGRAM_API_ID_US }}
          TELEGRAM_API_HASH_US: ${{ secrets.TELEGRAM_API_HASH_US }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL_NAME: ${{ secrets.AI_MODEL_NAME }}
          PYTHONPATH: ${{ github.workspace }}
          # 脚本内部可能用到的 Token
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          # 如果脚本需要这个变量，也请加上
          HOSTUUID: ${{ secrets.HOSTUUID }}
          # === 新增:免费过 reCAPTCHA v3 的关键 secret ===
          # 你本地 Chrome 浏览器里 google.com 的 cookie(JSON 数组字符串,一行)
          # 作用:让 v3 识别为"有谷歌历史的真实用户",分数直接拉高
          # 没配这个的话脚本会跳过注入,v3 分数会偏低
          GOOGLE_COOKIES_JSON: ${{ secrets.GOOGLE_COOKIES_JSON }}
          # 持久化 profile 目录,配合上面的 cache 用
          BROWSER_PROFILE_DIR: ./browser_profile
        run: python hax_renw_us.py

      # === 新增:上传调试截图,失败时能看到现场 ===
      - name: 📸 Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: op-screenshots-${{ github.run_attempt }}
          path: |
            output/*.png
            screenshots/*.png
          if-no-files-found: ignore

      - name: Change IP and Restart Workflow
        if: steps.hax_run.outcome == 'failure' && github.run_attempt < 6
        run: |
          echo "检测到任务失败，准备换 IP 重试（当前第 ${{ github.run_attempt }} 次）"

          # 必须与本文件顶部的 name 保持完全一致
          WORKFLOW_NAME="Hax-US Auto Renew Logic"

          # 获取当前公开仓库中的工作流 ID
          WORKFLOW_ID=$(curl -s -H "Authorization: token ${{ secrets.MY_GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows" \
            | jq -r ".workflows[] | select(.name==\"$WORKFLOW_NAME\") | .id")

          echo "目标工作流 ID: $WORKFLOW_ID"

          # 重启公开仓库的工作流实现换 IP
          curl -L -i -X POST \
            -H "Authorization: token ${{ secrets.MY_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW_ID/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}'

          exit 1
