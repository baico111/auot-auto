name: VPS8-1 Login

on:
  workflow_dispatch:
  push:
    paths:
      - "checkin.py"
      - "vps8-1.yml"
  schedule:
    # 每天北京时间 8:10 (UTC 0:10) 运行一次
    - cron: '10 0 * * *'

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # 1. 初始化 Python 环境
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 2. 安装 Xray (保持原样)
      - name: Install Xray
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          mkdir -p xray-bin
          unzip -oq Xray-linux-64.zip -d xray-bin
          chmod +x xray-bin/xray
          sudo mv xray-bin/xray /usr/local/bin/xray

      # 3. 构建 Xray 配置 (保持原样)
      - name: Build Xray config
        env:
          vps8_PROXY: ${{ secrets.vps8_PROXY }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          from urllib.parse import parse_qs, unquote, urlparse

          proxy_url = os.environ["vps8_PROXY"]
          parsed = urlparse(proxy_url)
          scheme = parsed.scheme

          if scheme not in {"vless", "vmess"}:
              raise SystemExit(f"Unsupported proxy scheme: {scheme}")

          def build_stream_settings(query, host):
              transport_type = query.get("type", "tcp")
              if transport_type == "h2":
                  transport_type = "http"
              stream_settings = {
                  "network": transport_type,
                  "security": query.get("security", "none"),
              }
              if stream_settings["security"] == "reality":
                  reality = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                      "publicKey": query.get("pbk", ""),
                  }
                  if query.get("sid"): reality["shortId"] = query["sid"]
                  if query.get("spx"): reality["spiderX"] = query["spx"]
                  stream_settings["realitySettings"] = reality
              elif stream_settings["security"] == "tls":
                  stream_settings["tlsSettings"] = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                  }
              if transport_type == "tcp":
                  header_type = query.get("headerType", "none")
                  stream_settings["tcpSettings"] = {"header": {"type": header_type}}
              elif transport_type == "ws":
                  headers = {}
                  if query.get("host"): headers["Host"] = query["host"]
                  stream_settings["wsSettings"] = {
                      "path": query.get("path", "/"),
                      "headers": headers,
                  }
              elif transport_type == "http":
                  host_list = [h for h in query.get("host", "").split(",") if h]
                  stream_settings["httpSettings"] = {
                      "host": host_list,
                      "path": query.get("path", "/"),
                  }
              elif transport_type == "grpc":
                  stream_settings["grpcSettings"] = {
                      "serviceName": query.get("serviceName", ""),
                      "authority": query.get("authority", ""),
                  }
              return stream_settings

          if scheme == "vless":
              qs = {k: v[-1] for k, v in parse_qs(parsed.query).items()}
              host = parsed.hostname
              port = parsed.port
              user_id = unquote(parsed.username or "")
              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{"id": user_id, "encryption": qs.get("encryption", "none"), "flow": qs.get("flow", "")}],
                      }]
                  },
                  "streamSettings": build_stream_settings(qs, host),
              }
          else:
              payload = parsed.netloc + parsed.path
              padded = payload + "=" * (-len(payload) % 4)
              vmess = json.loads(base64.urlsafe_b64decode(padded).decode("utf-8"))
              host = vmess.get("add")
              port = int(vmess.get("port", 0))
              user_id = vmess.get("id", "")
              query = {
                  "type": vmess.get("net", "tcp"),
                  "security": vmess.get("tls", "none"),
                  "path": vmess.get("path", "/") or "/",
                  "host": vmess.get("host", ""),
                  "sni": vmess.get("sni", "") or host,
                  "fp": vmess.get("fp", "chrome"),
                  "headerType": vmess.get("type", "none") or "none",
              }
              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{"id": user_id, "alterId": int(vmess.get("aid", 0) or 0), "security": vmess.get("scy", "auto")}],
                      }]
                  },
                  "streamSettings": build_stream_settings(query, host),
              }
          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{"listen": "127.0.0.1", "port": 8080, "protocol": "http"}],
              "outbounds": [outbound],
          }
          with open("xray-config.json", "w", encoding="ascii") as f:
              json.dump(config, f, indent=2)
          PY

      # 4. 启动代理 (保持原样)
      - name: Start Xray proxy
        run: |
          nohup xray run -c xray-config.json > xray.log 2>&1 &
          sleep 3
          xray version

      # 5. 设置 Python 运行环境 (针对 SeleniumBase)
      - name: Setup Python environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb google-chrome-stable
          pip install seleniumbase requests pyvirtualdisplay
          # 关键：安装浏览器驱动
          sbase install chromedriver

      # 6. 获取 Python 签到脚本 (原 Fetch checkin.js 改为 checkin.py)
      - name: Fetch vps8 checkin script
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          curl -sL \
            -H "Authorization: Bearer ${MY_GITHUB_TOKEN}" \
            -o checkin.py \
            "https://raw.githubusercontent.com/baico111/auto-haxrenw/main/checkin.py"

      # 7. 检查代理 IP (保持原样)
      - name: Check IP
        env:
          vps8_PROXY: http://127.0.0.1:8080
        run: |
          curl -s --proxy "$vps8_PROXY" https://api.ipify.org && echo
          curl -s --proxy "$vps8_PROXY" https://ipinfo.io

      # 8. 运行登录流程 (由 Node 改为 Python)
      - name: Run login flow
        id: login_step
        continue-on-error: true
        run: |
          mkdir -p screenshots
          # 使用 xvfb-run 配合 Python 运行
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" python checkin.py
        env:
          vps8_ACCOUNTS: ${{ secrets.vps8_ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 代理地址
          HTTP_PROXY: http://127.0.0.1:8080
          HTTPS_PROXY: http://127.0.0.1:8080

      # 9. 失败自动重启 (保持原样)
      - name: Restart Workflow on Failure
        if: steps.login_step.outcome == 'failure' && github.run_attempt < 6
        run: |
          echo "检测到任务失败，准备重启整个工作流（当前尝试第 ${{ github.run_attempt }} 次）"
          WORKFLOW_NAME="VPS8-1 Login"
          WORKFLOW_ID=$(curl -s -H "Authorization: token ${{ secrets.MY_GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows" \
            | jq -r ".workflows[] | select(.name==\"$WORKFLOW_NAME\") | .id")
          curl -L -i -X POST \
            -H "Authorization: token ${{ secrets.MY_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW_ID/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}'
          exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vps8-data
          path: screenshots/*
          retention-days: 1
